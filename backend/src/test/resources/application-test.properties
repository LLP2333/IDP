spring.application.name=idp-test

# \u5355\u5143\u6d4b\u8bd5\u4f7f\u7528\u5185\u5b58 H2 + Redis Mock\uff08\u907f\u514d\u5fc5\u987b\u542f\u52a8 docker compose\uff09
spring.datasource.url=jdbc:h2:mem:idp;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# \u6d4b\u8bd5\u73af\u5883\u4e0d\u8d77 Redis\uff0c\u4f7f\u7528 mock\u3002\u6309\u9700\u5728\u96c6\u6210\u6d4b\u8bd5\u4e2d\u7528 @MockBean StringRedisTemplate \u8986\u76d6\u3002
spring.data.redis.host=localhost
spring.data.redis.port=6379

# \u5173\u95ed Spring AI \u81ea\u52a8\u914d\u7f6e\uff08\u907f\u514d\u6d4b\u8bd5\u8c03\u7528\u5916\u90e8 API\uff09
spring.ai.openai.api-key=test
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration

idp.auth.jwt.secret=test-test-test-test-test-test-test-test-test-test-test-test
idp.auth.jwt.expires=60
idp.auth.jwt.issuer=idp-test
