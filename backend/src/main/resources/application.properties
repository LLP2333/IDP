spring.application.name=idp

# ========== \u6570\u636e\u5e93 ==========
spring.datasource.url=jdbc:postgresql://localhost:5432/idp
spring.datasource.username=idp
spring.datasource.password=idp
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== JPA / Hibernate ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

# ========== Redis ==========
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3s

# ========== Spring AI ==========
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.api-key=sk-208591d4839443b3aca65a0b7f9e4cac
spring.ai.model.chat=deepseek-v4-flash

# ========== \u670d\u52a1\u7aef\u53e3 ==========
server.port=8080

# ========== \u8de8\u57df\uff08\u4ec5\u5f00\u53d1\u9636\u6bb5\uff09==========
idp.cors.allowed-origins=http://localhost:3000

# ========== \u8ba4\u8bc1 / JWT ==========
# \u9ed8\u8ba4 secret \u4ec5\u4f9b\u672c\u5730\u5f00\u53d1\u4f7f\u7528\uff0c\u751f\u4ea7\u8bf7\u8986\u76d6
idp.auth.jwt.secret=${IDP_JWT_SECRET:idp-default-jwt-secret-key-please-override-in-production-environment}
idp.auth.jwt.expires=3600
idp.auth.jwt.issuer=idp

# ========== OpenAPI / Swagger UI ==========
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# ========== \u6587\u4ef6\u4e0a\u4f20 / \u5b58\u50a8 ==========
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB
# \u672c\u5730\u5b58\u50a8\u9ed8\u8ba4\u6839\u76ee\u5f55\uff08\u9ed8\u8ba4\u5b58\u50a8\u521d\u59cb\u5316\u4f7f\u7528\uff09
idp.file.local.base-path=${user.home}/.idp/files
# \u672c\u5730\u5b58\u50a8\u9ed8\u8ba4\u8bbf\u95ee\u57df\u540d\uff08\u9ed8\u8ba4\u5b58\u50a8\u521d\u59cb\u5316\u4f7f\u7528\uff09
idp.file.local.domain=http://localhost:8080/file/local/
# \u5b58\u50a8 SecretKey \u52a0\u5bc6\u5bc6\u94a5\uff08\u751f\u4ea7\u8bf7\u8986\u76d6\uff09
idp.storage.secret-key-cipher=${IDP_STORAGE_CIPHER:idp-default-storage-cipher-please-override}
